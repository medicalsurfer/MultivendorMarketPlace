<svg width="160" height="40" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon background: rounded square with gradient -->
  <rect x="0" y="4" width="32" height="32" rx="9" fill="url(#iconGrad)"/>

  <!-- Subtle inner highlight -->
  <rect x="0" y="4" width="32" height="15" rx="9" fill="white" opacity="0.07"/>

  <!-- V mark: bold, white, centered -->
  <path d="M7.5 13L16 27L24.5 13" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small accent dot below V tip — market pin -->
  <circle cx="16" cy="30.5" r="1.8" fill="white" opacity="0.9"/>

  <!-- Wordmark: "Ven" dark + "mark" purple -->
  <!-- V -->
  <text x="42" y="28" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="21" letter-spacing="-0.5" fill="#1F2937">Ven</text>
  <!-- mark -->
  <text x="82" y="28" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="21" letter-spacing="-0.5" fill="url(#textGrad)">mark</text>
</svg>
